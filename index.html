<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17695B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Whānau">
<title>Whānau – Familienplaner</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5F1; --surface:#FFFFFF; --ink:#23282C; --muted:#71787E;
  --pounamu:#17695B; --pounamu-soft:#E4EFEC; --pounamu-deep:#0E4A40;
  --gold:#E5A83B; --gold-soft:#FBF1DC; --coral:#D45B4A; --coral-soft:#FAE7E3;
  --line:#E7E3DC; --radius:16px; --radius-s:10px;
  --shadow:0 1px 3px rgba(35,40,44,.07),0 4px 14px rgba(35,40,44,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.45;
  padding-bottom:calc(64px + env(safe-area-inset-bottom))}
h1,h2,h3,.display{font-family:Sora,Inter,sans-serif}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink);background:var(--surface);
  border:1px solid var(--line);border-radius:var(--radius-s);padding:9px 11px;width:100%}
input:focus,select:focus,textarea:focus,button:focus-visible{outline:2px solid var(--pounamu);outline-offset:1px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* ---------- Kopf ---------- */
header.app{padding:calc(14px + env(safe-area-inset-top)) 18px 12px;display:flex;align-items:center;gap:10px}
header.app .koru{width:30px;height:30px;flex:none}
header.app h1{font-size:19px;font-weight:700;letter-spacing:-.01em}
header.app .sub{font-size:12px;color:var(--muted);margin-top:1px}
header.app .spacer{flex:1}
.iconbtn{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  background:var(--surface);box-shadow:var(--shadow);font-size:17px}

/* ---------- Layout ---------- */
main{padding:0 14px 24px;max-width:640px;margin:0 auto}
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
.card h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--pounamu);
  margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card h2 .cnt{margin-left:auto;font-family:Inter;color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0}
.empty{color:var(--muted);font-size:14px;padding:6px 0}
.row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .grow{flex:1;min-width:0}
.row .t{font-weight:500}
.row .s{font-size:12.5px;color:var(--muted)}
.row.done .t{text-decoration:line-through;color:var(--muted);font-weight:400}
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:600;padding:2px 8px;border-radius:99px;
  background:var(--pounamu-soft);color:var(--pounamu-deep);white-space:nowrap}
.chip.gold{background:var(--gold-soft);color:#8a5f12}
.chip.coral{background:var(--coral-soft);color:#93321f}
.avatar{width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:#fff;flex:none}
.check{width:24px;height:24px;border-radius:8px;border:2px solid var(--line);flex:none;display:flex;
  align-items:center;justify-content:center;font-size:14px;color:#fff;transition:background .15s,border-color .15s}
.check.on{background:var(--pounamu);border-color:var(--pounamu)}
.del{color:var(--muted);font-size:15px;padding:6px;flex:none}
.del:active{color:var(--coral)}
.btn{background:var(--pounamu);color:#fff;font-weight:600;border-radius:var(--radius-s);padding:10px 14px;font-size:14px}
.btn.ghost{background:var(--pounamu-soft);color:var(--pounamu-deep)}
.btn.small{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn.coral{background:var(--coral)}
.addform{display:flex;gap:8px;margin-top:10px}
.addform input,.addform select{flex:1;min-width:0}
.addform .btn{flex:none}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.formgrid .full{grid-column:1/-1}
.hint{font-size:12px;color:var(--muted);margin-top:8px}

/* ---------- Segmente ---------- */
.seg{display:flex;background:#EDEAE4;border-radius:12px;padding:3px;margin:2px 0 14px;gap:2px}
.seg button{flex:1;padding:8px 4px;border-radius:9px;font-size:13px;font-weight:600;color:var(--muted)}
.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--shadow)}

/* ---------- Heute ---------- */
.hero{padding:6px 4px 16px}
.hero .kia{font-family:Sora;font-size:14px;font-weight:600;color:var(--pounamu);letter-spacing:.02em}
.hero .datum{font-family:Sora;font-size:26px;font-weight:700;letter-spacing:-.02em;margin-top:2px}
.hero .fern{position:absolute;right:10px;top:8px;width:92px;opacity:.1;pointer-events:none}
.hero{position:relative}
.kidsentry{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:linear-gradient(120deg,var(--pounamu) 0%,#1F8A73 60%,#2AA184 100%);
  color:#fff;border-radius:var(--radius);padding:15px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.kidsentry .big{font-family:Sora;font-weight:700;font-size:16px}
.kidsentry .s{font-size:12.5px;opacity:.85}
.kidsentry .em{font-size:26px}
.kidsentry .arrow{margin-left:auto;font-size:18px;opacity:.8}
.cdrow{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.cdrow::-webkit-scrollbar{display:none}
.cdcard{flex:none;background:var(--surface);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;text-align:center;min-width:104px}
.cdcard .n{font-family:Sora;font-size:22px;font-weight:700;color:var(--pounamu)}
.cdcard .l{font-size:11.5px;color:var(--muted)}
.cdcard .e{font-size:16px}

/* ---------- Wochenplan / Stundenplan ---------- */
.weekrow{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
.weekrow:last-child{border-bottom:none}
.weekrow .day{flex:none;width:44px;text-align:center;padding-top:2px}
.weekrow .day .wd{font-family:Sora;font-weight:700;font-size:13px}
.weekrow .day .dt{font-size:11px;color:var(--muted)}
.weekrow.today .day .wd{color:var(--pounamu)}
.weekrow .grow{flex:1;min-width:0}
.stundengrid textarea{min-height:74px;font-size:13.5px}

/* ---------- Kindermodus ---------- */
#kids{position:fixed;inset:0;z-index:50;display:none;flex-direction:column;overflow-y:auto;
  background:linear-gradient(180deg,#BFE8DF 0%,#EAF6F0 40%,#FDF8EC 100%)}
#kids.open{display:flex}
#kids .khead{padding:calc(16px + env(safe-area-inset-top)) 18px 8px;display:flex;align-items:center;gap:10px}
#kids .khead h1{font-family:Sora;font-size:22px;font-weight:700;color:var(--pounamu-deep)}
#kids .khead .exit{margin-left:auto;background:rgba(255,255,255,.75);border-radius:99px;padding:8px 14px;
  font-size:13px;font-weight:600;color:var(--pounamu-deep)}
.kidpick{display:flex;gap:14px;justify-content:center;padding:26px 18px;flex-wrap:wrap}
.kidpick button{background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:20px 26px;text-align:center;min-width:130px}
.kidpick .av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;
  justify-content:center;font-size:30px;color:#fff}
.kidpick .nm{font-family:Sora;font-weight:700;font-size:17px}
.kidhome{padding:6px 16px 40px;max-width:560px;margin:0 auto;width:100%}
.starbank{background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:16px 18px;text-align:center;margin-bottom:14px}
.starbank .num{font-family:Sora;font-size:40px;font-weight:700;color:var(--gold)}
.starbank .lbl{font-size:13px;color:var(--muted)}
.starbank .goal{margin-top:8px;font-size:13.5px;font-weight:600;color:var(--pounamu-deep)}
.starbank .bar{height:10px;background:#F0EBDF;border-radius:99px;margin-top:8px;overflow:hidden}
.starbank .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#F2C464);border-radius:99px;transition:width .4s}
.ktask{display:flex;align-items:center;gap:14px;background:#fff;border-radius:20px;box-shadow:var(--shadow);
  padding:16px;margin-bottom:12px;width:100%;text-align:left}
.ktask .em{font-size:34px;flex:none}
.ktask .tt{font-family:Sora;font-weight:700;font-size:17px;flex:1}
.ktask .st{flex:none;font-weight:700;color:var(--gold);font-size:15px}
.ktask.done{opacity:.55}
.ktask.done .tt{text-decoration:line-through}
.ktask .kcheck{width:34px;height:34px;border-radius:12px;border:3px solid #E3DCCB;flex:none;display:flex;
  align-items:center;justify-content:center;font-size:19px;color:#fff}
.ktask.done .kcheck{background:var(--gold);border-color:var(--gold)}
.kcd{display:flex;gap:10px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}
.kcd::-webkit-scrollbar{display:none}
.kcd .cdcard{min-width:120px;border-radius:18px}
.kcd .cdcard .n{font-size:26px}
.burst{position:fixed;pointer-events:none;font-size:30px;z-index:60;animation:burst .9s ease-out forwards}
@keyframes burst{0%{transform:scale(.4) translateY(0);opacity:1}100%{transform:scale(1.6) translateY(-90px);opacity:0}}

/* ---------- Bottom-Nav ---------- */
nav.tabs{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:40}
nav.tabs button{flex:1;padding:8px 2px 9px;display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10.5px;font-weight:600;color:var(--muted)}
nav.tabs button .i{font-size:19px}
nav.tabs button.on{color:var(--pounamu)}

/* ---------- Modal / Login ---------- */
.modal{position:fixed;inset:0;background:rgba(20,30,28,.45);z-index:70;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));
  width:100%;max-width:640px;max-height:86vh;overflow-y:auto}
.sheet h3{font-size:17px;margin-bottom:14px}
#login{position:fixed;inset:0;background:var(--bg);z-index:80;display:none;align-items:center;justify-content:center;padding:24px}
#login.open{display:flex}
#login .box{width:100%;max-width:360px;text-align:center}
#login .box .koru{width:64px;height:64px;margin:0 auto 14px}
#login h1{font-size:24px;margin-bottom:4px}
#login .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
#login input{margin-bottom:10px;text-align:left}
#login .err{color:var(--coral);font-size:13px;min-height:18px;margin-top:8px}
.setupwarn{background:var(--gold-soft);border-radius:var(--radius-s);padding:12px;font-size:13.5px;text-align:left;margin-top:16px}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:86px;background:var(--ink);color:#fff;
  padding:10px 18px;border-radius:99px;font-size:13.5px;z-index:75;box-shadow:var(--shadow);opacity:0;transition:opacity .25s}
.toast.show{opacity:1}

/* ---------- Banner (offline / Update / Feiertag) ---------- */
#offline{display:none;position:fixed;top:0;left:0;right:0;z-index:90;background:var(--gold);color:#3a2a05;
  text-align:center;font-size:12.5px;font-weight:600;padding:6px calc(8px + env(safe-area-inset-top)) 6px 8px}
#offline.show{display:block}
#update{display:none;position:fixed;left:50%;transform:translateX(-50%);bottom:86px;z-index:75;
  background:var(--ink);color:#fff;border-radius:14px;padding:10px 14px;font-size:13.5px;box-shadow:var(--shadow);
  align-items:center;gap:12px}
#update.show{display:flex}
#update button{background:var(--gold);color:#3a2a05;font-weight:700;border-radius:9px;padding:6px 12px;font-size:12.5px}
.banner{display:flex;align-items:center;gap:10px;background:var(--gold-soft);border-radius:var(--radius);
  padding:12px 14px;margin-bottom:12px;font-weight:600;color:#6b4c0e;box-shadow:var(--shadow)}
.banner.gruen{background:var(--pounamu-soft);color:var(--pounamu-deep)}
.loader{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 0;color:var(--muted)}
.loader .k{width:44px;height:44px;border:4px solid var(--pounamu-soft);border-top-color:var(--pounamu);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chiprow button{background:var(--pounamu-soft);color:var(--pounamu-deep);font-size:12.5px;font-weight:600;
  padding:6px 11px;border-radius:99px}
.donesec{margin-top:10px;padding-top:8px;border-top:1px dashed var(--line)}
.sheetinput{font-size:17px;padding:13px;margin:6px 0 14px}
.pininput{font-family:Sora;font-size:30px;letter-spacing:.4em;text-align:center;padding:12px;margin:6px 0 14px}
.moneycard{background:linear-gradient(160deg,#FFF9EC,#FDF3DC)}
@media (prefers-color-scheme: dark){.moneycard{background:linear-gradient(160deg,#332A15,#2A2312)}}
.kmoney-btn{display:block;width:100%;margin-top:12px;background:linear-gradient(120deg,var(--gold),#F2C464);
  color:#4a3405;font-family:Sora;font-weight:700;font-size:18px;padding:16px;border-radius:18px;box-shadow:var(--shadow)}
.kmoney-btn:active{transform:scale(.97)}
.kiwi-spruch{text-align:center;font-size:14px;color:var(--pounamu-deep);margin:-4px 0 14px;font-weight:600}

/* ---------- Dark Mode ---------- */
@media (prefers-color-scheme: dark){
  :root{--bg:#15191C;--surface:#1F2528;--ink:#E8E6E1;--muted:#9AA2A8;
    --pounamu:#3AA98F;--pounamu-soft:#1C3A33;--pounamu-deep:#8FD8C4;
    --gold:#D9A339;--gold-soft:#3A2E14;--coral:#E07260;--coral-soft:#402019;
    --line:#33393D;--shadow:0 1px 3px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.25)}
  .seg{background:#12161A}
  .starbank .bar{background:#2A3033}
  #kids{background:linear-gradient(180deg,#1B3B36 0%,#1D2E2A 40%,#26231A 100%)}
  .kidpick button,.starbank,.ktask{background:#242B2E}
  .ktask .kcheck{border-color:#3A4145}
  #kids .khead .exit{background:rgba(40,48,50,.85);color:var(--pounamu-deep)}
  input,select,textarea{background:#242B2E}
}
</style>
</head>
<body>

<div id="login" class="open">
  <div class="box">
    <svg class="koru" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="30" fill="#17695B"/><path d="M32 50 C18 50 12 38 16 28 C20 18 32 14 40 20 C47 25 47 35 40 38 C34 41 28 37 29 31 C30 26 35 25 37 28" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/></svg>
    <h1>Whānau</h1>
    <div class="sub">Euer Familienplaner</div>
    <div id="loginform">
      <input type="email" id="lg-mail" placeholder="E-Mail" autocomplete="username">
      <input type="password" id="lg-pass" placeholder="Passwort" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <label style="display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--muted);margin:2px 0 12px;text-align:left">
        <input type="checkbox" id="lg-merken" checked style="width:auto"> Angemeldet bleiben
      </label>
      <button class="btn" style="width:100%" onclick="doLogin()">Anmelden</button>
      <div class="err" id="lg-err"></div>
    </div>
    <div id="setupwarn" class="setupwarn" style="display:none">
      <strong>Einrichtung nötig:</strong> In <code>firebase-config.js</code> fehlen noch die Firebase-Zugangsdaten. Die Schritte stehen in der <strong>ANLEITUNG.md</strong>.
    </div>
  </div>
</div>

<header class="app">
  <svg class="koru" viewBox="0 0 64 64" aria-hidden="true"><circle cx="32" cy="32" r="30" fill="#17695B"/><path d="M32 50 C18 50 12 38 16 28 C20 18 32 14 40 20 C47 25 47 35 40 38 C34 41 28 37 29 31 C30 26 35 25 37 28" fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round"/></svg>
  <div><h1>Whānau</h1><div class="sub" id="headsub"></div></div>
  <div class="spacer"></div>
  <button class="iconbtn" title="Abmelden" onclick="doLogout()">⎋</button>
</header>

<main id="main"></main>

<nav class="tabs" id="tabs"></nav>

<div id="kids"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>
<div id="offline">📡 Keine Verbindung – Änderungen werden gesichert, sobald ihr wieder online seid</div>
<div id="update"><span>Neue Version verfügbar</span><button onclick="updateJetzt()">Aktualisieren</button></div>

<script src="firebase-app-compat.js"></script>
<script src="firebase-auth-compat.js"></script>
<script src="firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
